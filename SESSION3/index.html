<html>

<head>
<title>HSCMS Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="validation.js"></script>
</head>

<body>

<h2>Sensor Feed Entry</h2>

<form onsubmit="return validateForm()">

Sensor Type:
<input type="text" id="sensor"><br><br>

Location:
<input type="text" id="location"><br><br>

Alert Level:
<select id="level">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select><br><br>

<button type="submit">Submit</button>

</form>

</body>

</html>
